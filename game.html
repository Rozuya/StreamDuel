<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon de Duel | StreamDuel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #050508; color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        h1 { font-weight: 900; color: #fff; margin-bottom: 5px; font-size: 2.5rem; text-transform: uppercase; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 1.1rem; }
        .arena-container { display: flex; justify-content: center; align-items: stretch; gap: 30px; flex-wrap: wrap; margin-bottom: 40px; }
        .team-box { background: #0d0d14; padding: 25px; border-radius: 12px; border: 1px solid #1a1a24; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .team-box.blue { border-top: 4px solid #00e5ff; }
        .team-box.red { border-top: 4px solid #ff0055; }
        .team-box h2 { margin-top: 0; font-size: 1.5rem; letter-spacing: -1px; }
        .blue h2 { color: #00e5ff; }
        .red h2 { color: #ff0055; }
        .player-list { list-style: none; padding: 0; margin: 20px 0 0 0; }
        .player-item { background: #151520; margin-bottom: 10px; padding: 15px; border-radius: 8px; font-weight: 700; color: #555; border: 1px solid #333; }
        .player-item.filled { color: #fff; border-color: #444; }
        .vs-badge { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: #333; font-style: italic; }
        .controls { background: #0d0d14; padding: 30px; border-radius: 12px; border: 1px solid #1a1a24; max-width: 700px; margin: 0 auto; }
        .link-box { display: flex; gap: 10px; margin-bottom: 25px; }
        .link-box input { flex: 1; padding: 15px; border-radius: 6px; border: 1px solid #333; background: #050508; color: #00e5ff; font-family: monospace; }
        button { padding: 15px 30px; border-radius: 6px; border: none; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .btn-launch { background: #00e5ff; color: #000; width: 100%; font-size: 1.2rem; }
    </style>
</head>
<body>
    <h1>Préparation du Duel</h1>
    <p class="subtitle">En attente des combattants...</p>

    <div class="arena-container">
        <!-- Équipe 1 -->
        <div class="team-box blue">
            <h2 id="team1-name">Équipe de ...</h2>
            <ul class="player-list">
                <li class="player-item filled" id="host-player">👑 Chargement...</li>
                <li class="player-item">En attente...</li>
                <li class="player-item">En attente...</li>
                <li class="player-item">En attente...</li>
            </ul>
        </div>

        <div class="vs-badge">VS</div>

        <!-- Équipe 2 -->
        <div class="team-box red">
            <h2 id="team2-name">Équipe de ...</h2>
            <ul class="player-list">
                <li class="player-item">En attente...</li>
                <li class="player-item">En attente...</li>
                <li class="player-item">En attente...</li>
                <li class="player-item">En attente...</li>
            </ul>
        </div>
    </div>

    <div class="controls">
        <div class="link-box">
            <input type="text" id="invite-link" readonly>
            <button onclick="copierLien()" style="background:#333; color:white;">Copier</button>
        </div>
        <button class="btn-launch" onclick="lancerJeu()">Lancer le jeu aléatoire</button>
    </div>

    <script>
        // Récupération des noms
        const monNom = localStorage.getItem('streamerPseudo') || "hol_rozuya";
        const urlParams = new URLSearchParams(window.location.search);
        const nomAdversaire = urlParams.get('adversaire') || "Adversaire";

        // Application des noms
        document.getElementById('team1-name').innerText = "Équipe de " + monNom;
        document.getElementById('team2-name').innerText = "Équipe de " + nomAdversaire;
        document.getElementById('host-player').innerText = "👑 " + monNom;
        document.getElementById('invite-link').value = window.location.origin + window.location.pathname;

        function copierLien() {
            const linkInput = document.getElementById('invite-link');
            linkInput.select();
            navigator.clipboard.writeText(linkInput.value);
            alert("Lien copié !");
        }

        function lancerJeu() {
            const jeux = ['clics', 'quiz', 'survie', 'vitesse', 'memoire'];
            const choix = jeux[Math.floor(Math.random() * jeux.length)];
            window.location.href = `jeu.html?game=${choix}`;
        }
    </script>
</body>
</html>
