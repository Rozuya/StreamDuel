<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Salon de Duel</title>
    <style>
        body { background: #050508; color: white; font-family: 'Inter', sans-serif; text-align: center; padding: 50px; }
        .lobby { background: #0d0d14; padding: 40px; border-radius: 12px; width: 350px; margin: 0 auto; }
        button { padding: 12px 25px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; margin-top: 10px; }
    </style>
</head>
<body>
    <h1 id="title">Salon de duel</h1>
    <div class="lobby">
        <ul id="players" style="list-style:none; padding:0;"></ul>
        <button onclick="lancerJeu()" style="background:#00e5ff; width:100%;">LANCER LE JEU ALÉATOIRE</button>
        <button onclick="navigator.clipboard.writeText(window.location.href)" style="background:#333; color:white; width:100%;">COPIER LE LIEN DU SALON</button>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('title').innerText = "Salon : " + (urlParams.get('team') || "En attente");
        
        function lancerJeu() {
            const jeux = ['clics', 'quiz', 'survie', 'vitesse', 'memoire'];
            const choix = jeux[Math.floor(Math.random() * jeux.length)];
            window.location.href = `jeu.html?game=${choix}`;
        }
    </script>
</body>
</html>
